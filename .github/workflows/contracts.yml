name: Contracts

on:
  push:
    paths:
      - "contracts/**"
      - "test/**"
      - "scripts/deploy-dev.js"
      - "scripts/deploy-vn-coffee-case.js"
      - "scripts/deploy-base-sepolia.js"
      - "hardhat.config.js"
      - "package.json"
      - ".github/workflows/contracts.yml"
  pull_request:
    paths:
      - "contracts/**"
      - "test/**"
      - "scripts/deploy-dev.js"
      - "scripts/deploy-vn-coffee-case.js"
      - "scripts/deploy-base-sepolia.js"
      - "hardhat.config.js"
      - "package.json"
      - ".github/workflows/contracts.yml"
  workflow_dispatch:
    inputs:
      deploy_base_sepolia:
        description: "Deploy TradeSigningRegistry, LogisticsEvidenceRegistry, and BankVault to Base Sepolia"
        required: true
        type: boolean
        default: false

jobs:
  compile:
    name: Compile Solidity contracts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Compile contracts
        run: npm run contracts:compile

  test:
    name: Test Solidity contracts
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Run contract tests
        run: npm run contracts:test

  deploy-dev:
    name: Deploy to Hardhat dev chain
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Deploy to ephemeral Hardhat chain
        run: npm run contracts:deploy:dev

      - name: Upload dev deployment record
        uses: actions/upload-artifact@v4
        with:
          name: hardhat-dev-deployment
          path: deployments/hardhat-dev.json

  deploy-case-dev:
    name: Deploy Vietnam coffee case to Hardhat dev chain
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Deploy Vietnam coffee financing case
        run: npx hardhat run scripts/deploy-vn-coffee-case.js --network hardhat

      - name: Upload Vietnam coffee case deployment record
        uses: actions/upload-artifact@v4
        with:
          name: vn-coffee-case-hardhat-deployment
          path: deployments/vn-coffee-case-hardhat.json

  deploy-base-sepolia:
    name: Deploy to Base Sepolia
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_base_sepolia == true
    environment: base-sepolia
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Check deployment secrets
        run: |
          if [ -z "$BASE_SEPOLIA_RPC_URL" ]; then echo "Missing BASE_SEPOLIA_RPC_URL" && exit 1; fi
          if [ -z "$DEPLOYER_PRIVATE_KEY" ]; then echo "Missing DEPLOYER_PRIVATE_KEY" && exit 1; fi
        env:
          BASE_SEPOLIA_RPC_URL: ${{ secrets.BASE_SEPOLIA_RPC_URL }}
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}

      - name: Deploy contracts
        run: npm run contracts:deploy:base-sepolia
        env:
          BASE_SEPOLIA_RPC_URL: ${{ secrets.BASE_SEPOLIA_RPC_URL }}
          DEPLOYER_PRIVATE_KEY: ${{ secrets.DEPLOYER_PRIVATE_KEY }}

      - name: Upload deployment record
        uses: actions/upload-artifact@v4
        with:
          name: base-sepolia-deployment
          path: deployments/base-sepolia.json
